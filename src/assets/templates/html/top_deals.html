<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #111111;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Máscara PNG de sobreposição */
        .template-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 1080px; height: 1350px;
            z-index: 2;
            pointer-events: none;
        }

        /* Camada 1: Imagens dos Produtos (Sem fundos coloridos) */
        .product-box {
            position: absolute;
            z-index: 1;
            display: flex; align-items: center; justify-content: center;
            background-color: #FFFFFF;
            overflow: hidden;
        }
        .product-image {
            max-width: 95%; max-height: 95%;
            object-fit: contain;
        }

        /* Camada 3: Textos estilizados (Frente) */
        .price-box {
            position: absolute;
            z-index: 3;
            display: flex;
            flex-direction: row;
            gap: 15px;
            justify-content: center;
            align-items: center;
            background: transparent;
            overflow: hidden;
            text-align: center;
        }

        .old-price {
            font-size: 18px;
            font-weight: 700;
            color: #E53935;
            text-decoration: line-through;
            opacity: 0.85;
        }

        .new-price {
            font-size: 36px;
            font-weight: 900;
            color: #FFFFFF;
            line-height: 1;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.2), 2px 2px 4px rgba(0,0,0,0.6);
            white-space: nowrap;
        }

        .discount-box {
            position: absolute;
            z-index: 3;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            overflow: hidden;
        }

        .discount-number {
            font-size: 28px;
            font-weight: 900;
            color: #FFFFFF;
            line-height: 1;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
        }

        /* Coordenadas Absolutas Adaptadas da Planilha (1080x1350) */
        /* PRODUTOS */
        .pos-prod-1 { left: 68px; top: 343px; width: 459px; height: 411px; }
        .pos-prod-2 { left: 558px; top: 342px; width: 459px; height: 411px; }
        .pos-prod-3 { left: 68px; top: 777px; width: 459px; height: 418px; }
        .pos-prod-4 { left: 558px; top: 778px; width: 459px; height: 418px; }

        /* DESCONTOS */
        .pos-disc-1 { left: 78px; top: 352px; width: 67px; height: 71px; }
        .pos-disc-2 { left: 569px; top: 352px; width: 67px; height: 71px; }
        .pos-disc-3 { left: 78px; top: 789px; width: 67px; height: 71px; }
        .pos-disc-4 { left: 569px; top: 789px; width: 67px; height: 71px; }

        /* PREÇOS */
        .pos-price-1 { left: 103px; top: 679px; width: 312px; height: 54px; }
        .pos-price-2 { left: 589px; top: 679px; width: 312px; height: 54px; }
        .pos-price-3 { left: 103px; top: 1124px; width: 312px; height: 54px; }
        .pos-price-4 { left: 589px; top: 1124px; width: 312px; height: 54px; }
    </style>
</head>
<body>

    {% for offer in offers %}
    <div class="product-box pos-prod-{{ loop.index }}">
        <img src="{{ offer.image_url }}" class="product-image" loading="eager" referrerpolicy="no-referrer">
    </div>
    {% endfor %}

    <img src="{{ mask_data_uri }}" class="template-overlay">

    {% for offer in offers %}
    <div class="price-box pos-price-{{ loop.index }}">
        {% if offer.old_price %}
        <div class="old-price">{{ offer.old_price }}</div>
        {% endif %}
        <div class="new-price">{{ offer.price }}</div>
    </div>
    <div class="discount-box pos-disc-{{ loop.index }}">
        <div class="discount-number">{{ offer.discount }}%</div>
    </div>
    {% endfor %}

</body>
</html>
