<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #111111;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* Camada 1: A Grade com as fotos da Shopee */
        .products-grid {
            position: absolute;
            /* AJUSTE ESSAS COORDENADAS PARA ALINHAR COM OS BURACOS DO SEU PNG */
            top: 350px; left: 50px;
            width: 980px; height: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 40px;
            z-index: 1;
        }
        .product-box {
            background-color: #FFFFFF;
            border-radius: 20px;
            padding: 20px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .product-image {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
        }

        /* Camada 2: A sua arte (PNG com buracos transparentes) */
        .template-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 1080px; height: 1350px;
            z-index: 2;
            pointer-events: none; /* Deixa o Playwright interagir com o que está atrás se precisar */
        }

        /* Camada 3: Os preços formatados */
        .prices-grid {
            position: absolute;
            /* DEVE TER O MESMO TAMANHO E POSIÇÃO DA GRADE DE PRODUTOS */
            top: 350px; left: 50px;
            width: 980px; height: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 40px;
            z-index: 3;
        }
        .price-box {
            position: relative;
            width: 100%; height: 100%;
        }
        .price-text {
            position: absolute;
            /* AJUSTE ESSAS COORDENADAS PARA CAIR EXATAMENTE EM CIMA DA ETIQUETA DO PNG */
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFC107; /* Amarelo Destaque */
            font-size: 50px;
            text-shadow: 3px 3px 0px #111111;
        }
    </style>
</head>
<body>

    <div class="products-grid">
        {% for offer in offers %}
        <div class="product-box">
            <img src="{{ offer.image_url }}" class="product-image" loading="eager" referrerpolicy="no-referrer" crossorigin="anonymous">
        </div>
        {% endfor %}
    </div>

    <img src="{{ base_dir_uri }}/src/assets/templates/images/TD_template_vazado.png" class="template-overlay">

    <div class="prices-grid">
        {% for offer in offers %}
        <div class="price-box">
            <div class="price-text">{{ offer.price }}</div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
